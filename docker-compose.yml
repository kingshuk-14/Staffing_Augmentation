version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: staffing_backend
    restart: always
    environment:
      - DB_HOST=host.docker.internal
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root}
      - DB_NAME=staffing_db
      - PORT=5000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_123!}
      - EMAIL_HOST=${SMTP_HOST}
      - EMAIL_PORT=${SMTP_PORT}
      - EMAIL_USER=${SMTP_USER}
      - EMAIL_PASS=${SMTP_PASS}
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/usr/src/app/uploads
      - backend_sent_emails:/usr/src/app/sent_emails

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staffing_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  backend_uploads:
  backend_sent_emails:

version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: staffing_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root}
      MYSQL_DATABASE: staffing_db
      MYSQL_USER: ${DB_USER:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount schema.sql to automatically initialize empty database
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: staffing_backend
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root}
      - DB_NAME=staffing_db
      - PORT=5000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_123!}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/usr/src/app/uploads
      - backend_sent_emails:/usr/src/app/sent_emails

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staffing_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment the below line if you generate local SSL certs for HTTPS:
      # - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  mysql_data:
  backend_uploads:
  backend_sent_emails:
